    <main> 
        <!-- login oauth google -->
        <div class="d-flex justify-content-center align-items-center flex-column" style="height: 100px;">
            <h1>2Kin Appv2</h1>
            apps for kindle
        </div>
<div id="login-container">
        <h2>Inicia sesión para usar Gemini</h2>
        <div id="g_id_onload"
             data-client_id="772285279790-jjia3ncdumgh5ne3ik7venj0ojdsir7u.apps.googleusercontent.com"
             data-callback="manejarLogin"
             data-ux_mode="redirect"
               data-login_uri=""
             data-auto_prompt="false">
            </div>
            <!-- data-login_uri="https://jhonnattan-rivera.github.io/2kin.app" -->
        <div class="g_id_signin" data-type="standard"></div>
    </div>

    <div id="app" class="hidden">
        <h2>¡Bienvenido, <span id="user-name"></span>!</h2>
        <p>Tu sesión está activa. Aquí irá tu input para Gemini.</p>
        <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <script>
        const loginUriByHost = {
            'localhost:3000': 'http://localhost:3000/redirect_login',
            'jhonnattan-rivera.github.io': 'https://jhonnattan-rivera.github.io/2kin.app/redirect_login'
        };
        const loginUri = loginUriByHost[window.location.host]
            || `${window.location.origin}/redirect_login`;

        document.getElementById('g_id_onload').setAttribute(
            'data-login_uri',
            loginUri
        );

        function mostrarVistaAutenticada(userName) {
            document.getElementById('user-name').innerText = userName || 'usuario';
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        function mostrarVistaLogin() {
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }

        function evaluarSesionGuardada() {
            const userName = localStorage.getItem('user_name');
            const token = localStorage.getItem('google_token');

            if (userName && token) {
                mostrarVistaAutenticada(userName);
                return;
            }

            mostrarVistaLogin();
        }

        // Función que ejecuta Google automáticamente al loguearse con éxito
        function manejarLogin(response) {
            // El 'credential' es un JWT (JSON Web Token) enviado por Google
            const token = response.credential;
            
            // Decodificamos el JWT de forma manual y ultra ligera para sacar los datos del usuario
            const payload = JSON.parse(atob(token.split('.')[1]));
            
            // Mostramos los datos en la interfaz
            document.getElementById('user-name').innerText = payload.name;

            // Persistimos sesión local para restaurar al recargar
            localStorage.setItem('google_token', token);
            localStorage.setItem('user_name', payload.name || 'usuario');
            
            // Intercambiamos de vista de forma simple
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            console.log("Token de Google obtenido:", token);
            // NOTA: Este token es el que deberías mandar a tu backend para validar y conectar con Gemini
        }

        function cerrarSesion() {
            // Limpiamos la sesión local y volvemos al estado de login
            localStorage.removeItem('google_token');
            localStorage.removeItem('user_name');
            mostrarVistaLogin();

            // Si la API está disponible, cerramos la sesión de Google One Tap
            if (window.google && window.google.accounts && window.google.accounts.id) {
                window.google.accounts.id.disableAutoSelect();
            }
        }

        document.addEventListener('DOMContentLoaded', evaluarSesionGuardada);
    </script>
    </main>
