<body>
    <button id="btn-google-login" type="button">
        Iniciar sesión con Google
    </button>
    <script>
        function loginGoogle() {
            var clientId = "772285279790-jjia3ncdumgh5ne3ik7venj0ojdsir7u.apps.googleusercontent.com";

            // Keep the current folder so redirect works in subpaths (e.g. GitHub Pages).
            var path = window.location.pathname || "/";
            var basePath = path.replace(/[^/]*$/, "");

            if (!window.location.origin || window.location.origin === "null") {
                alert("Abre esta app desde http://localhost o un dominio web. Google OAuth no funciona con file://");
                return;
            }

            var redirectUri = window.location.origin + basePath + "redirect_login.html";
            var scope = "openid profile email";
            var nonce = Math.random().toString(36).slice(2);
            var state = Math.random().toString(36).slice(2);

            var url =
                "https://accounts.google.com/o/oauth2/v2/auth" +
                "?client_id=" + encodeURIComponent(clientId) +
                "&redirect_uri=" + encodeURIComponent(redirectUri) +
                "&response_type=" + encodeURIComponent("id_token token") +
                "&scope=" + encodeURIComponent(scope) +
                "&nonce=" + encodeURIComponent(nonce) +
                "&state=" + encodeURIComponent(state);

            window.location.assign(url);
        }

        document.getElementById("btn-google-login").addEventListener("click", loginGoogle);
    </script>
