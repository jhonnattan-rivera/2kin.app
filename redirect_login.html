<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Procesando acceso</title>
  </head>
  <body>
    <p id="status">Procesando inicio de sesion...</p>
    <script>
      function parseParams(raw) {
        const out = {};
        const data = (raw || '').replace(/^#|^\?/, '');
        if (!data) {
          return out;
        }

        data.split('&').forEach(function (part) {
          if (!part) {
            return;
          }
          const pieces = part.split('=');
          const key = decodeURIComponent(pieces[0] || '');
          const value = decodeURIComponent(pieces.slice(1).join('=') || '');
          out[key] = value;
        });

        return out;
      }

      function decodeJwtPayload(jwt) {
        const middle = jwt.split('.')[1] || '';
        const normalized = middle.replace(/-/g, '+').replace(/_/g, '/');
        const padded = normalized + '='.repeat((4 - (normalized.length % 4)) % 4);
        return JSON.parse(atob(padded));
      }

      const statusEl = document.getElementById('status');
      const hashParams = parseParams(window.location.hash);
      const queryParams = parseParams(window.location.search);
      const params = Object.assign({}, queryParams, hashParams);

      if (params.error) {
        statusEl.innerText = 'Google devolvio un error: ' + params.error;
        console.error('Error OAuth Google:', params);
      } else {
        const token = params.id_token || params.access_token || '';

        if (!token) {
          statusEl.innerText = 'No se recibio token en la redireccion.';
          console.error('Redirect sin token:', params);
        } else {
          try {
            let userName = 'usuario';

            if (params.id_token) {
              const payload = decodeJwtPayload(params.id_token);
              userName = payload.name || payload.given_name || userName;
            }

            localStorage.setItem('google_token', token);
            localStorage.setItem('user_name', userName);

            statusEl.innerText = 'Inicio de sesion correcto. Redirigiendo...';
            window.location.replace('/');
          } catch (error) {
            statusEl.innerText = 'No se pudo procesar el inicio de sesion.';
            console.error('Error procesando redirect de Google:', error);
          }
        }
      }
    </script>
  </body>
</html>
